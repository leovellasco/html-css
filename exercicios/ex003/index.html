<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <h1>Trabalhando com listas</h1>
    <h2>Listas Ordenadas</h2>
    <ol type="1" start="1">
        <li>Vasco</li>
        <ol type="a">
            <li>Vasco sub-20</li>
            <li>Vasco sub-17</li>
        </ol>
        <li>Flamengo</li>
        <li>Fluminense</li>
        <li>Botafogo</li>
    </ol>    

    <h2>Listas não ordenadas</h2>
    <ul type = "circle">
        <li>Vasco</li>
        <li>Flamengo</li>
        <li>Fluminense</li>
        <li>Botafogo</li>

    </ul>
    
        
</body>
</html>
