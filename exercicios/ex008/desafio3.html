<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Desafio das tabelas 3</title>
    <style>
        table{
            border-spacing: 0px;
        }
        td{
            border: 1px solid black;
            text-align: center;
            width: 70px;
            height: 30px;
            font: 15px arial;
            font-weight: bolder;
            padding: 3px;
        }
        th{
            border: 1px solid black;
            text-align: center;
            width: 70px;
            height:30px;
            font: 17px arial;
            background-color: gray;
            color: white;
            padding: 3px;
        }

    </style>
</head>
<body>
    <h1>Desafio 3</h1>
    <table>
        <caption>Tabela 3</caption>
    <tr>
        <th rowspan="2">Área</th>
        <th rowspan="2">Disciplinas</th>
        <th colspan="2">Notas</th>
        <th rowspan="2">Média</th>
    </tr>
    <tr>
        <th>Nota 1</th>
        <th>Nota 2</th>
    </tr>
    <tr>
        <td rowspan="4">Exatas</td>

        <td>0.0</td>
        <td>0.0</td>
        <td>0.0</td>
    </tr>
    <tr>
        <td>Física</td>
        <td>0.0</td>
        <td>0.0</td>
        <td>0.0</td>
    </tr>
    <tr>
        <td>Química</td>
        <td>0.0</td>
        <td>0.0</td>
        <td>0.0</td>
    </tr>
    <tr>
        <td>Biologia</td>
        <td>0.0</td>
        <td>0.0</td>
        <td>0.0</td>
    </tr>
    <tr>
        <th colspan="4">Média de Exatas</th>
        <td style="background-color: gray; color: white;">0.0</td>
    </tr>
    <td rowspan="2">Humanas</td>
        <td>História</td>
        <td>0.0</td>
        <td>0.0</td>
        <td>0.0</td>
    </tr>
    <tr>
        <td>Geografia</td>
        <td>0.0</td>
        <td>0.0</td>
        <td>0.0</td>
    <tr>
        <th colspan="4">Média de Humanas</th>
        <td style="background-color: gray; color: white;">0.0</td>
    </tr>
   
</table>
</body>
</html>
