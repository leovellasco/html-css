    <rect x="27" y="20" width="12" height="15" fill="#fff"/>
    <rect x="39" y="20" width="12" height="15" fill="#000"/>
    <rect x="51" y="20" width="12" height="15" fill="#fff"/>
    <rect x="63" y="20" width="12" height="15" fill="#000"/>
    <rect x="75" y="20" width="10" height="15" fill="#fff"/>
